<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Connexion - Loup-Garou</title>
        <link rel="stylesheet" href="css/login.css" />
    </head>

    <body>
        <div id="container">
            <h1>Connexion</h1>

            <form action="php/login.php" method="POST" id="formConnexion">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="mail"
                    placeholder="ton@email.com"
                    name="email"
                />

                <label for="motDePasse">Mot de passe</label>
                <input
                    type="password"
                    id="motDePasse"
                    placeholder="••••••••"
                    name="mdp"
                />

                <button id="btnConnexion">Se connecter</button>
            </form>

            <p id="erreur"></p>

            <p>Pas encore de compte ? <a href="register.html">S'inscrire</a></p>
            <a href="index.php">← Retour</a>
        </div>

        <script type="module" src="js/login.js"></script>
    </body>
</html>
